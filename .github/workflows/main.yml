name: Build and Test AWI2-gr7-achat

on:
  push:
    branches:
      - chouichiasma_awi2_g7
  pull_request:
    branches:
      - chouichiasma_awi2_g7

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Maven
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          cache: maven

      - name: Build with Maven
        run: mvn clean install

      - name: Run tests
        run: mvn test

      - name: Verify Java version
        run: java -version
